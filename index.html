<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="StockFlow - Acceso seguro al sistema" />
    <title>StockFlow | Login</title>
    <link rel="stylesheet" href="styles.css" />
    <script src="app.js" defer></script>
  </head>
  <body>
    <header class="site-header">
      <div class="container nav-wrap">
        <a class="brand" href="index.html">StockFlow</a>
        <nav class="nav-links" aria-label="Navegación principal">
          <a href="dashboard.html">Dashboard</a>
          <a href="inventario.html">Inventario</a>
          <a href="vendedor.html">Vendedor</a>
          <a href="gastos.html">Gastos</a>
          <a href="reportes.html">Reportes</a>
        </nav>
      </div>
    </header>

    <main class="container">
      <section class="card" aria-labelledby="login-title">
        <h1 id="login-title">Iniciar sesión</h1>
        <form id="loginForm" class="form-grid" novalidate>
          <label for="email">
            Email
            <input id="email" name="email" type="email" placeholder="usuario@empresa.com" required />
          </label>

          <label for="password">
            Contraseña
            <input id="password" name="password" type="password" placeholder="Ingrese su contraseña" required />
          </label>

          <label for="role">
            Rol
            <select id="role" name="role" required>
              <option value="">Seleccione un rol</option>
              <option value="Administrador">Administrador</option>
              <option value="Vendedor">Vendedor</option>
              <option value="Repositor">Repositor</option>
            </select>
          </label>

          <p id="loginError" class="error-message" aria-live="polite"></p>
          <button class="btn btn-primary" type="submit">Ingresar</button>
        </form>
      </section>
    </main>
  </body>
</html>
