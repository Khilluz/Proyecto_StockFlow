<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StockFlow - Iniciar Sesión</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../css/login.css">
</head>
<body class="bg-gray-100">
    <div class="login-container">
        <div class="login-card">
            <!-- Logo/Header -->
            <div class="login-header">
                <h1>StockFlow</h1>
                <p>Sistema de Gestión de Inventario</p>
            </div>

            <!-- Formulario -->
            <form id="loginForm" class="login-form">
                <!-- Email -->
                <div class="form-group">
                    <label for="email">
                        Correo Electrónico
                    </label>
                    <input
                        type="email"
                        id="email"
                        name="email"
                        placeholder="ejemplo@correo.com"
                    />
                </div>

                <!-- Contraseña -->
                <div class="form-group">
                    <label for="password">
                        Contraseña
                    </label>
                    <input
                        type="password"
                        id="password"
                        name="password"
                        placeholder="••••••••"
                    />
                </div>

                <!-- Selector de Rol -->
                <div class="role-selector">
                    <label>
                        Selecciona tu Rol
                    </label>
                    <div class="role-options">
                        <label class="role-option">
                            <input
                                type="radio"
                                name="rol"
                                value="administrador"
                            />
                            <span>
                                Administrador
                            </span>
                        </label>
                        <label class="role-option">
                            <input
                                type="radio"
                                name="rol"
                                value="vendedor"
                            />
                            <span>
                                Vendedor
                            </span>
                        </label>
                    </div>
                </div>

                <!-- Mensaje de Error -->
                <div
                    id="errorMessage"
                    class="error-message"
                >
                    <p id="errorText"></p>
                </div>

                <!-- Botón Ingreso -->
                <button
                    type="submit"
                    class="login-btn"
                >
                    Ingresar
                </button>
            </form>

            <!-- Link Ayuda -->
            <p class="login-footer">
                ¿Problemas para acceder?
                <a href="#">
                    Contacta soporte
                </a>
            </p>
        </div>
    </div>

    <!-- Script de Login -->
    <script src="../assets/js/login.js"></script>
</body>
</html>
