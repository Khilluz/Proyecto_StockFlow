<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StockFlow - Iniciar Sesión</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/login.css">
</head>
<body class="bg-light">
    <div class="d-flex align-items-center justify-content-center min-vh-100 px-3 py-4">
        <div class="card shadow-lg p-5" style="width: 100%; max-width: 400px;">
            <!-- Logo/Header -->
            <div class="text-center mb-4">
                <h1 class="display-5 fw-bold text-primary">StockFlow</h1>
                <p class="text-muted">Sistema de Gestión de Inventario</p>
            </div>

            <!-- Formulario -->
            <form id="loginForm" class="needs-validation">
                <!-- Email -->
                <div class="mb-3">
                    <label for="email" class="form-label fw-semibold">
                        Correo Electrónico
                    </label>
                    <input
                        type="email"
                        id="email"
                        name="email"
                        placeholder="ejemplo@correo.com"
                        class="form-control"
                    />
                </div>

                <!-- Contraseña -->
                <div class="mb-3">
                    <label for="password" class="form-label fw-semibold">
                        Contraseña
                    </label>
                    <input
                        type="password"
                        id="password"
                        name="password"
                        placeholder="••••••••"
                        class="form-control"
                    />
                </div>

                <!-- Selector de Rol -->
                <div class="mb-3">
                    <label class="form-label fw-semibold d-block">Selecciona tu Rol</label>
                    <div class="form-check border p-3 rounded mb-2">
                        <input
                            type="radio"
                            name="rol"
                            value="administrador"
                            class="form-check-input"
                            id="adminRole"
                        />
                        <label class="form-check-label" for="adminRole">
                            👨‍💼 Administrador
                        </label>
                    </div>
                    <div class="form-check border p-3 rounded">
                        <input
                            type="radio"
                            name="rol"
                            value="vendedor"
                            class="form-check-input"
                            id="vendedorRole"
                        />
                        <label class="form-check-label" for="vendedorRole">
                            🧑‍💼 Vendedor
                        </label>
                    </div>
                </div>

                <!-- Mensaje de Error -->
                <div
                    id="errorMessage"
                    class="alert alert-danger d-none"
                    role="alert"
                >
                    <p id="errorText" class="mb-0"></p>
                </div>

                <!-- Botón Ingreso -->
                <button
                    type="submit"
                    class="btn btn-primary w-100 fw-semibold mt-4"
                >
                    🔐 Ingresar
                </button>
            </form>

            <!-- Link Ayuda -->
            <p class="text-center text-muted small mt-4">
                ¿Problemas para acceder?
                <a href="#" class="text-decoration-none fw-semibold">Contacta soporte</a>
            </p>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Script de Login -->
    <script src="../assets/js/login.js"></script>
</body>
</html>
